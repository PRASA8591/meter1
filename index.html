<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Trip Meter Log</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <img src="logo1.png" alt="Company Logo" />
        <div>
          <h1>Trip Meter Log</h1>
          <p>Secure fleet access for drivers and admins.</p>
        </div>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-title">
          <h2>Sign in to your account</h2>
          <p>Enter your credentials to continue.</p>
        </div>

        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-field">
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
            <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">👁️</button>
          </div>
        </div>

        <div class="form-row">
          <label class="checkbox-label"><input type="checkbox" id="rememberMe"> Remember me</label>
          <a href="#" id="forgotPassword">Forgot password?</a>
        </div>

        <div id="loginError" class="login-error"></div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>

      <div class="login-footer">
        <span>Need help? </span><a href="mailto:support@prasatek.site">support@prasatek.site</a>
      </div>
      <div class="login-meta">Version 5.6</div>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
